<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <script>
        function updateCpu() {
    fetch('/api/cpu')
        .then(r => r.text())
        .then(t => document.getElementById('cpu-value').textContent = t)
        .catch(e => console.error(e));
}

function updateRam() {
    fetch('/api/ram') 
        .then(r => r.text())
        .then(t => document.getElementById('ram-value').textContent = t)
        .catch(e => console.error(e));
}


setInterval(updateCpu, 1000);
setInterval(updateRam, 1000);

updateCpu();
updateRam();
</script>
</head>
<body>
    <h1>Панель управления</h1>



    <button>Выключение</button>
    <button>Перезагрузка</button>
    <button onclick="fetch('/run_bat', {method: 'POST'})">Запуск bat</button>

    
    <h1>Загрузка CPU: <span id="cpu-value">{CPU}</span>%</h1>
    <h1>Загрузка RAM: <span id="ram-value">{RAM}</span>%</h1>

    <h1>Процессор: <span id="infoCPU">{infoCPU}</span></h1>
    <h1>Оперативная память: <span id="infoRAM">{infoRAM} ГБ</span></h1>

</body>
</html>
